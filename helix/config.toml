theme = "dark_plus"

[editor]
line-number = "relative"
mouse = true
bufferline = "always"

[keys.insert]
C-j = ["move_line_down", "scroll_down"]
C-k = ["move_line_up", "scroll_up"]
j = { k = "normal_mode" } # Maps `jk` to exit insert mode
C-h = "move_char_left"
C-l = "move_char_right"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "|"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "VISUAL"
